name: UNIT TESTS CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
    
jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v2
    - name: Configure CMake
      run: cmake -S . -B build
    - name: Build
      run: cmake --build build --config Release
    - name: Upload Test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path : build/unit_tests_sample.exe  

    